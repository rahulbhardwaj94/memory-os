name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: memory_os
          POSTGRES_PASSWORD: memory_os
          POSTGRES_DB: memory_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memory_os"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://memory_os:memory_os@localhost:5432/memory_os_test
      EMBEDDING_PROVIDER: openai
      OPENAI_API_KEY: sk-test-placeholder
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npm run generate

      - name: Run migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - name: Typecheck (server)
        run: npx tsc --noEmit -p tsconfig.base.json

      - name: Typecheck (web)
        run: cd apps/web && npx tsc --noEmit

      - name: Unit tests
        run: npm test --workspace=apps/server

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npm run generate

      - name: Build server
        run: npm run build --workspace=@memory-os/server

      - name: Build web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_USER_ID: placeholder
