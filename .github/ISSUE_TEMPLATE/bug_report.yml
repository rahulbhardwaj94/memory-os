name: Bug Report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below as completely as you can — it speeds up the fix significantly.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of memory-os is affected?
      options:
        - MCP server (stdio)
        - REST API
        - Web UI
        - Embedding provider
        - Prisma / database
        - Docker / setup
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I call `recall` with a namespace, it returns..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Set EMBEDDING_PROVIDER=ollama
        2. Run `npm run mcp:start`
        3. Call the `remember` tool with content "..."
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in the relevant fields.
      value: |
        - OS:
        - Node version: (run `node -v`)
        - memory-os version / commit:
        - EMBEDDING_PROVIDER:
        - MCP client (Claude Desktop / Cursor / other):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output from stderr. Use triple backticks for code blocks.
      render: shell
