services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory-os-postgres
    environment:
      POSTGRES_USER: memory_os
      POSTGRES_PASSWORD: memory_os
      POSTGRES_DB: memory_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_os -d memory_os"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
